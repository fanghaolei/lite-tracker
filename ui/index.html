<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lite Tracker | Portfolio</title>
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = { darkMode: 'class' };
    (function () {
      var theme = 'light';
      try {
        theme = localStorage.getItem('theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      } catch (e) {}
      document.documentElement.classList.toggle('dark', theme === 'dark');
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
      try {
        document.documentElement.classList.toggle('privacy-mode', localStorage.getItem('privacyMode') === 'on');
      } catch (e) {}
      try {
        var branding = JSON.parse(localStorage.getItem('liteTracker.branding') || '{}');
        if (branding.app_name) document.title = branding.app_name + ' | Portfolio';
      } catch (e) {}
    }());
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,850&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css?v=react-ts-2">
</head>
<body class="app-body bg-[#f8f5ed] dark:bg-gray-900 min-h-screen font-sans text-gray-900 dark:text-gray-100 transition-colors duration-200">
  <div id="root" data-view="portfolio"></div>
  <script type="module" src="./src/main.tsx"></script>
</body>
</html>
